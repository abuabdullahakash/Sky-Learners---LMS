<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - SkyLearners LMS</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: #09090b;
      color: #f4f4f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
      text-align: center;
    }
    .container {
      max-width: 480px;
      padding: 2.5rem 2rem;
      background-color: #121215;
      border: 1px solid #27272a;
      border-radius: 1rem;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }
    .icon {
      width: 64px;
      height: 64px;
      margin-bottom: 1.5rem;
      color: #e11d48;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    p {
      color: #a1a1aa;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 1.75rem;
    }
    .btn {
      display: inline-block;
      background-color: #e11d48;
      color: #ffffff;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: background-color 0.2s ease;
      cursor: pointer;
      border: none;
    }
    .btn:hover {
      background-color: #be123c;
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a5 5 0 01-1.414-3.536c0-1.38.56-2.63 1.414-3.536m-2.829-2.829a9 9 0 0112.728 0M3 3l18 18" />
    </svg>
    <h1>আপনি বর্তমানে অফলাইনে আছেন</h1>
    <p>আপনার ইন্টারনেট সংযোগ বিচ্ছিন্ন হয়ে গেছে। সংযোগ আসার পর অনুগ্রহ করে পুনরায় চেষ্টা করুন।</p>
    <button class="btn" onclick="window.location.reload()">পুনরায় চেষ্টা করুন (Retry)</button>
  </div>
</body>
</html>
